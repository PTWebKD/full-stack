services:
  - type: web
    name: fitfuel-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python -m alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "http://localhost:5173,http://localhost:3000,https://fe-ob5yiejcn-khangne-s-projects.vercel.app,https://*.vercel.app"
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_DAYS
        value: "7"
